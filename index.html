                      onDisconnect();
                    }}>Disconnect</button>
                  </div>
                )}
              </div>
            </div>
          </header>

          {hasAnyError && (
            <div className="error-banner" role="alert" style={{marginBottom:16}}>
              Some sections couldn't load: <strong>{failedKeys.join(', ')}</strong>. Retry each card individually below — single requests usually succeed once the rate limit refills.
            </div>
          )}

          {/* Per-key state helpers — render real card when ready, error card when failed,
              skeleton otherwise. Keeps the dashboard usable when one endpoint fails. */}
          {(() => {
            const ready = (k) => data && (data[k] !== undefined);
            const failed = (k) => errors[k] !== undefined;
            const ErrCard = ({ title, onRetry }) => (
              <div className="card fade-in">
                <div className="card-header"><h3 className="card-title">{title}</h3></div>
                <div className="card-error-row">
                  <span>Failed to load</span>
                  {onRetry && (
                    <button
                      onClick={onRetry}
                      className="retry-btn"
                      title="Retry this card"
                      aria-label={`Retry ${title}`}
                    >↻ Retry</button>
                  )}
                </div>
              </div>
            );

            return (
              <>
                {/* KPI row */}
                <section className="grid grid-kpis" style={{marginBottom: 20}}>
                  {ready('total') || failed('total') ? (
                    <KPICard
                      label="Total visitors"
                      value={failed('total') ? '—' : fmtNum(totalNum)}
                      trend={trend}
                      sub={`vs previous ${presetLabel(preset)}`}
                    />
                  ) : <SkeletonKPI />}
                  {ready('hits') || failed('hits') ? (
                    <KPICard
                      label="Pageviews"
                      value={failed('hits') ? '—' : fmtNum(pageviewSum)}
                      sub={presetLabel(preset)}
                    />
                  ) : <SkeletonKPI />}
                  {ready('hits') || failed('hits') ? (
                    <KPICard
                      label="Top page"
                      value={failed('hits') ? '—' : topPagePath.name}
                      sub={failed('hits') ? '' : `${fmtNum(topPagePath.count)} hits`}
                      isString
                    />
                  ) : <SkeletonKPI />}
                  {ready('hits') || failed('hits') ? (
                    <KPICard
                      label="Tracked paths"
                      value={failed('hits') ? '—' : fmtNum(data?.hits?.hits?.length || 0)}
                      sub="distinct URLs in range"
                    />
                  ) : <SkeletonKPI />}
                </section>

                {/* Traffic chart */}
                <section style={{marginBottom: 20}}>
                  {failed('hits') ? <ErrCard title="Visitors over time" onRetry={() => retryKey('hits')} />
                    : ready('hits') ? <TrafficChart series={trafficSeries} group={group} />
                    : <SkeletonCard h={280} />}
                </section>

                {/* Top pages + Languages — paired list cards. 70/30 split.
                    Both load in Tier 1 so they appear together; an asymmetric
                    skeleton (one rendered, one shimming) would look broken.
                    Aggregate referrers aren't returned by GoatCounter at the
                    dashboard level — click any row in Top Pages to drill in. */}
                <section className="grid grid-7-3" style={{marginBottom: 20}}>
                  {failed('hits') ? <ErrCard title="Top pages" onRetry={() => retryKey('hits')} />
                    : ready('hits') ? (
                      <TopPagesCard
                        paths={data?.hits?.hits || []}
                        total={totalNum}
                        client={client}
                        dateRange={dateRange}
                      />
                    ) : <SkeletonCard />}
                  {failed('languages') ? <ErrCard title="Languages" onRetry={() => retryKey('languages')} />
                    : ready('languages') ? <TopListCard title="Languages" stats={data?.languages?.stats} />
                    : <SkeletonCard />}
                </section>

                {/* Donuts: browsers / OS / devices — lazy on visibility (Tier 2) */}
                <section ref={donutRowRef} className="grid grid-3" style={{marginBottom: 20}}>
                  {failed('browsers') ? <ErrCard title="Browsers" onRetry={() => retryKey('browsers')} />
                    : ready('browsers') ? <DonutCard title="Browsers" stats={data?.browsers?.stats} />
                    : <SkeletonCard />}
                  {failed('systems') ? <ErrCard title="Operating systems" onRetry={() => retryKey('systems')} />
                    : ready('systems') ? <DonutCard title="Operating systems" stats={data?.systems?.stats} />
                    : <SkeletonCard />}
                  {failed('sizes') ? <ErrCard title="Devices" onRetry={() => retryKey('sizes')} />
                    : ready('sizes') ? <DonutCard title="Devices" stats={data?.sizes?.stats} deviceMode />
                    : <SkeletonCard />}
                </section>

                {/* Countries with embedded world map — full width, lazy on
                    visibility (Tier 3). The map is the heaviest visual on the
                    page and benefits from the full width; users who only want
                    quick stats never need to scroll past it. */}
                <section ref={geoRowRef} style={{marginBottom: 20}}>
                  {failed('locations') ? <ErrCard title="Countries" onRetry={() => retryKey('locations')} />
                    : ready('locations') ? (
                      <TopListCard
                        title="Countries"
                        stats={data?.locations?.stats}
                        prefix={(x) => <span style={{marginRight:8, fontSize:'1rem'}}>{flagFor(x.name)}</span>}
                        topSlot={<WorldMap data={data?.locations?.stats} total={totalNum} />}
                      />
                    ) : <SkeletonCard />}
                </section>

                {/* Campaigns — lazy on visibility (Tier 4). Only renders the card if data has rows. */}
                <section ref={campaignsRef} style={{marginBottom: 20}}>
                  {ready('campaigns') && data?.campaigns?.stats?.length > 0 && (
                    <div className="grid">
                      <TopListCard
                        title="Campaigns"
                        subtitle="Campaign parameters seen in traffic"
                        stats={data.campaigns.stats}
                      />
                    </div>
                  )}
                </section>
              </>
            );
          })()}

          <footer className="footer">
            Built with <span className="heart">♥</span> by{' '}
            <a href="https://abhishekhsingh.github.io" target="_blank" rel="noopener noreferrer">Abhishekh Singh</a>
            {' · '}
            <a href="https://github.com/abhishekhsingh/goatcounter-dashboard" target="_blank" rel="noopener noreferrer">GitHub</a>
            {' · '}
            Powered by <a href="https://goatcounter.com" target="_blank" rel="noopener noreferrer">GoatCounter</a> API
          </footer>
        </div>
      );
    }

    // ============================================================
    // ROOT
    // ============================================================
    function App() {
      const [theme, toggleTheme] = useTheme();
      const [config, setConfig] = useState(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) {}
        return null;
      });
      const [authError, setAuthError] = useState('');

      const handleConnect = useCallback(({ baseURL, apiKey, me }) => {
        const cfg = { baseURL, apiKey, me };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); } catch (e) {}
        setConfig(cfg);
        setAuthError('');
      }, []);

      const handleDisconnect = useCallback((msg) => {
        try {
          if (config?.baseURL) APIClient.clearCache(config.baseURL);
          localStorage.removeItem(STORAGE_KEY);
        } catch (e) {}
        setConfig(null);
        if (msg) setAuthError(msg);
        else setAuthError('');
      }, [config?.baseURL]);

      if (!config) {
        return <ConnectScreen onConnect={handleConnect} initialError={authError} />;
      }

      return (
        <Dashboard
          config={config}
          onDisconnect={handleDisconnect}
          theme={theme}
          toggleTheme={toggleTheme}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
